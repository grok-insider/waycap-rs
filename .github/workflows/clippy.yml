name: Clippy Check
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  clippy:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.6.0-devel-ubuntu24.04
      options: --user root
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install system dependencies
      run: |
        apt-get update
        apt-get install -y software-properties-common
        add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
        apt-get update
        apt-get install -y pipewire libpipewire-0.3-dev \
          libdbus-1-dev \
          libavutil-dev \
          libavformat-dev \
          libavcodec-dev \
          libswscale-dev \
          libavdevice-dev \
          libavfilter-dev \
          libwayland-dev \
          libwayland-client0 \
          wayland-protocols \
          pkg-config \
          curl \
          build-essential \
          libssl-dev \
          libclang-dev

    - name: Check PipeWire version
      run: pkg-config --modversion libpipewire-0.3
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
          
    - name: Verify CUDA installation
      run: nvcc --version
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-clippy-
          ${{ runner.os }}-cargo-
          
    - name: Run Clippy (vaapi)
      run: cargo clippy --all-targets --no-default-features --features vaapi -- -D warnings

    - name: Run Clippy (nvidia + vulkan)
      run: cargo clippy --all-targets --features "nvidia,vulkan" -- -D warnings

    - name: Run Clippy (nvidia + egl)
      run: cargo clippy --all-targets --features "nvidia,egl" -- -D warnings

    - name: Run Clippy (vaapi + nvidia + vulkan)
      run: cargo clippy --all-targets --features "vaapi,nvidia,vulkan" -- -D warnings
